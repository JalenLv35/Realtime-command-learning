<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Command Learning Viewer</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="topbar">
      <h1>Command Learning</h1>
      <span id="status">connecting…</span>
    </header>
    <div class="toolbar">
      <button class="mode-btn active" data-mode="beginner">新手</button>
      <button class="mode-btn" data-mode="intermediate">进阶</button>
      <button class="mode-btn" data-mode="expert">精通</button>
    </div>
    <section id="events" class="events"></section>
    <script src="/app.js"></script>
  </body>
</html>
